name: CI

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set variables
        id: vars
        run: |
          SHA=${GITHUB_SHA::7}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "sha=${SHA}" >> $GITHUB_OUTPUT
          echo "image=ghcr.io/${OWNER}/sre-gitops-argocd" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          build-args: VERSION=${{ steps.vars.outputs.sha }}
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}


      - name: Patch image tag in deployment.yaml
        run: |
          FULL_IMAGE="${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.sha }}"
          sed -i "s|image: ghcr.io/.*/.*:.*|image: ${FULL_IMAGE}|" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --staged --quiet \
            || git commit -m "ci: update image to ${{ steps.vars.outputs.sha }}"
          git push
